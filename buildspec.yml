version: 0.2

env:
  variables:
    REPOSITORY_URI: 912221131717.dkr.ecr.us-east-1.amazonaws.com/awsdevopsecr
    IMAGE_TAG: latest

phases:
  install:
    runtime-versions:
      java: corretto17

  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 912221131717.dkr.ecr.us-east-1.amazonaws.com
  build:
    commands:
      - mvn clean package
      - docker build -t $REPOSITORY_URI:latest .
      - docker tag $REPOSITORY_URI:latest $REPOSITORY_URI:$IMAGE_TAG

  post_build:
    commands:
      - echo Pushing image...
      - docker push $REPOSITORY_URI:latest
      - docker push $REPOSITORY_URI:$IMAGE_TAG
